<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트팜 토마토 생장 시뮬레이션</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1d23;
  color: #e0e0e0;
  font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}
#header {
  text-align: center;
  padding: 10px 16px;
  background: linear-gradient(180deg, #22262e, #1a1d23);
  border-bottom: 1px solid #2a2e36;
}
#header h1 {
  font-size: 18px;
  font-weight: 600;
  color: #c8d0dc;
  letter-spacing: 1px;
}
#header .subtitle {
  font-size: 11px;
  color: #6b7280;
  margin-top: 2px;
}
#canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #0f1114;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
#stage-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 28px;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  text-shadow: 0 2px 12px rgba(0,0,0,0.7);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s ease;
}
#info-panel {
  display: flex;
  justify-content: center;
  gap: 24px;
  padding: 8px 16px;
  background: #22262e;
  border-top: 1px solid #2a2e36;
  flex-wrap: wrap;
}
.info-item {
  text-align: center;
  min-width: 80px;
}
.info-label {
  font-size: 10px;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.info-value {
  font-size: 15px;
  font-weight: 600;
  color: #e5e7eb;
  margin-top: 1px;
}
.info-value.stage {
  color: #6ee7b7;
  font-size: 13px;
}
#controls {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: #1a1d23;
  border-top: 1px solid #2a2e36;
}
#controls button {
  background: #2a2e36;
  border: 1px solid #3a3e46;
  color: #e0e0e0;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
#controls button:hover { background: #3a3e46; }
#controls button.active { background: #4a6741; border-color: #6ee7b7; }
#scrubber-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
#scrubber {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: #2a2e36;
  outline: none;
  cursor: pointer;
}
#scrubber::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #6ee7b7;
  cursor: pointer;
  box-shadow: 0 0 6px rgba(110,231,183,0.4);
}
#scrubber-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: #6b7280;
}
#speed-btn {
  font-size: 12px !important;
  width: auto !important;
  padding: 0 10px !important;
  font-weight: 600;
}
</style>
</head>
<body>

<div id="header">
  <h1>스마트팜 토마토 생장 시뮬레이션</h1>
  <div class="subtitle">온실 행잉베드 코코배지 재배 | 120일 생육 주기</div>
</div>

<div id="canvas-wrap">
  <canvas id="sim"></canvas>
  <div id="stage-overlay"></div>
</div>

<div id="info-panel">
  <div class="info-item"><div class="info-label">생장단계</div><div class="info-value stage" id="v-stage">육묘기</div></div>
  <div class="info-item"><div class="info-label">Day</div><div class="info-value" id="v-day">0 / 120</div></div>
  <div class="info-item"><div class="info-label">초장</div><div class="info-value" id="v-height">0 cm</div></div>
  <div class="info-item"><div class="info-label">엽수</div><div class="info-value" id="v-leaves">0</div></div>
  <div class="info-item"><div class="info-label">화방수</div><div class="info-value" id="v-trusses">0</div></div>
  <div class="info-item"><div class="info-label">착과수</div><div class="info-value" id="v-fruits">0</div></div>
  <div class="info-item"><div class="info-label">숙성단계</div><div class="info-value" id="v-ripen">-</div></div>
</div>

<div id="controls">
  <button id="play-btn" title="재생/일시정지">&#9654;</button>
  <button id="reset-btn" title="처음으로">&#9632;</button>
  <div id="scrubber-wrap">
    <input type="range" id="scrubber" min="0" max="120" step="0.1" value="0">
    <div id="scrubber-labels"><span>Day 0</span><span>30</span><span>60</span><span>90</span><span>Day 120</span></div>
  </div>
  <button id="speed-btn" title="속도 변경">1x</button>
</div>

<script>
// ============================================================
// CONFIG & CONSTANTS
// ============================================================
const TOTAL_DAYS = 120;
const TOTAL_DURATION = 120; // seconds
const MAX_HEIGHT_CM = 200;
const PIXELS_PER_CM = 3.2;

const STAGE_COLORS = [
  [34, 120, 30],    // 녹숙기 - dark green
  [140, 148, 50],   // 변색기 - tannish-yellow-green
  [185, 110, 60],   // 채색기 - turning pink/orange
  [210, 80, 65],    // 도색기 - pink-red
  [215, 50, 40],    // 담적색기 - light red
  [195, 30, 22],    // 완숙기 - deep red
];

const GROWTH_STAGES = [
  { name: '육묘기', nameEn: 'Seedling', dayStart: 0, dayEnd: 10 },
  { name: '영양생장기', nameEn: 'Vegetative', dayStart: 10, dayEnd: 35 },
  { name: '개화기', nameEn: 'Flowering', dayStart: 35, dayEnd: 50 },
  { name: '착과기', nameEn: 'Fruit Set', dayStart: 50, dayEnd: 70 },
  { name: '과실비대기', nameEn: 'Fruit Dev.', dayStart: 70, dayEnd: 95 },
  { name: '숙성기', nameEn: 'Ripening', dayStart: 95, dayEnd: 120 },
];

const RIPEN_NAMES = ['녹숙기','변색기','채색기','도색기','담적색기','완숙기'];

// Seeded random for deterministic results
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

// ============================================================
// PLANT MODEL
// ============================================================
function sigmoid(x, k, mid) {
  return 1 / (1 + Math.exp(-k * (x - mid)));
}

function lerp(a, b, t) {
  return a + (b - a) * Math.max(0, Math.min(1, t));
}

function lerpColor(c1, c2, t) {
  t = Math.max(0, Math.min(1, t));
  return [
    Math.round(c1[0] + (c2[0] - c1[0]) * t),
    Math.round(c1[1] + (c2[1] - c1[1]) * t),
    Math.round(c1[2] + (c2[2] - c1[2]) * t),
  ];
}

function computePlantState(day) {
  const rng = seededRandom(42);

  // Stem height - logistic curve
  const heightCm = MAX_HEIGHT_CM * sigmoid(day, 0.07, 45);

  // Node generation: starts at day 5, new node every ~2.3 days
  const nodeStartDay = 5;
  const nodeInterval = 2.3;
  const totalNodes = day < nodeStartDay ? 0 : Math.floor((day - nodeStartDay) / nodeInterval) + 1;
  const maxNodes = 50;
  const nodeCount = Math.min(totalNodes, maxNodes);

  const nodes = [];
  let trussCount = 0;
  let totalFruits = 0;
  let maxRipenStage = -1;

  for (let i = 0; i < nodeCount; i++) {
    const nodeDay = nodeStartDay + i * nodeInterval;
    const age = day - nodeDay; // days since this node appeared

    // Node height along stem (distribute evenly up to current height)
    const nodeFrac = nodeCount <= 1 ? 0 : i / (nodeCount - 1);
    const nodeHeightCm = heightCm * (0.02 + 0.96 * nodeFrac);

    // Leaf maturity (grows over 7 days)
    const leafMaturity = Math.min(1, age / 7);

    // Leaf size depends on position - middle leaves largest
    const positionFactor = Math.sin(nodeFrac * Math.PI);
    const leafSizeFactor = 0.4 + 0.6 * positionFactor;

    // Leaf aging - older lower leaves yellow and droop
    const leafAge = age;
    const yellowing = leafAge > 60 ? Math.min(1, (leafAge - 60) / 30) : 0;
    const droopExtra = leafAge > 40 ? Math.min(30, (leafAge - 40) * 0.5) : 0;

    // Leaflet count: young leaves 3, mature 5-7
    const leafletCount = leafMaturity < 0.3 ? 3 : (leafMaturity < 0.7 ? 5 : 7);

    // Side: alternating with slight randomness
    const side = i % 2 === 0 ? 1 : -1;
    const baseAngle = side * (55 + rng() * 10);

    // Truss: sympodial pattern - every 3rd leaf starting at node 10
    let truss = null;
    const isTrussNode = i >= 10 && (i - 10) % 3 === 0;

    if (isTrussNode) {
      const trussAge = age - 5; // truss appears 5 days after node
      if (trussAge > 0) {
        trussCount++;
        const flowerCount = 3 + Math.floor(rng() * 3); // 3-5 flowers
        const flowers = [];
        const fruits = [];

        for (let f = 0; f < flowerCount; f++) {
          const flowerDelay = f * 2; // flowers open sequentially
          const flowerAge = trussAge - flowerDelay;

          if (flowerAge > 0) {
            const bloomProgress = Math.min(1, flowerAge / 5);
            const fruitAge = flowerAge - 12; // fruit set 12 days after bloom

            if (fruitAge > 0) {
              // Fruit development
              const diameterMm = 75 * sigmoid(fruitAge, 0.12, 18);

              // Ripening: starts when fruit is ~60% developed (around fruitAge 25)
              const ripenStart = 25;
              let ripenStage = 0;
              let ripenFraction = 0;

              if (fruitAge > ripenStart) {
                const ripenProgress = (fruitAge - ripenStart) / 18; // 18 days for full ripen
                const totalStageProgress = ripenProgress * 5; // 0-5 across 6 stages
                ripenStage = Math.min(5, Math.floor(totalStageProgress));
                ripenFraction = totalStageProgress - ripenStage;
                if (ripenStage >= 5) ripenFraction = 1;
              }

              const c1 = STAGE_COLORS[ripenStage];
              const c2 = STAGE_COLORS[Math.min(5, ripenStage + 1)];
              const color = lerpColor(c1, c2, ripenFraction);

              fruits.push({
                index: f,
                diameterMm,
                ripenStage,
                ripenFraction,
                color,
                age: fruitAge,
              });
              totalFruits++;
              if (ripenStage > maxRipenStage) maxRipenStage = ripenStage;
            } else {
              // Still a flower
              flowers.push({
                index: f,
                bloomProgress,
              });
            }
          }
        }

        truss = { flowers, fruits, side };
      }
    }

    nodes.push({
      index: i,
      heightCm: nodeHeightCm,
      leafMaturity,
      leafSizeFactor,
      leafletCount,
      side,
      baseAngle,
      yellowing,
      droopExtra,
      truss,
      rng: rng(), // deterministic random per node
    });
  }

  // Cotyledons for early stage
  const hasCotyledons = day >= 3 && day < 25;
  const cotyledonSize = day < 3 ? 0 : (day < 8 ? (day - 3) / 5 : (day < 25 ? 1 - (day - 15) / 10 : 0));

  // Current growth stage
  let currentStage = GROWTH_STAGES[0];
  for (const s of GROWTH_STAGES) {
    if (day >= s.dayStart) currentStage = s;
  }

  // Leaf count (visible mature leaves)
  const leafCount = nodes.filter(n => n.leafMaturity > 0.2).length;

  return {
    day,
    heightCm,
    nodes,
    nodeCount,
    leafCount,
    trussCount,
    totalFruits,
    maxRipenStage,
    currentStage,
    hasCotyledons,
    cotyledonSize: Math.max(0, Math.min(1, cotyledonSize)),
  };
}

// ============================================================
// RENDERER
// ============================================================
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  dpr = window.devicePixelRatio || 1;
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Convert plant cm to screen pixels with viewport
function plantToScreen(cmX, cmY, viewport) {
  const sx = W / 2 + (cmX * viewport.scale);
  const sy = H - 60 - ((cmY - viewport.scrollY) * viewport.scale);
  return [sx, sy];
}

function computeViewport(heightCm) {
  // Show the full plant with some padding
  const minVisible = 30; // cm minimum visible height
  const visibleHeight = Math.max(minVisible, heightCm + 20);
  const availableH = H - 70; // pixels available
  const scale = availableH / visibleHeight;
  const clampedScale = Math.min(PIXELS_PER_CM * 1.2, Math.max(1.0, scale));
  const scrollY = 0;
  return { scale: clampedScale, scrollY };
}

function drawBackground(state) {
  // Sky gradient through greenhouse
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1e3a2a');
  grad.addColorStop(0.3, '#162a20');
  grad.addColorStop(1, '#0f1114');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Greenhouse roof lines (subtle)
  ctx.strokeStyle = 'rgba(100,130,110,0.12)';
  ctx.lineWidth = 1;
  const roofY = 30;
  ctx.beginPath();
  ctx.moveTo(0, roofY);
  ctx.lineTo(W / 2, roofY - 20);
  ctx.lineTo(W, roofY);
  ctx.stroke();

  // Subtle light rays
  ctx.save();
  const rayGrad = ctx.createRadialGradient(W * 0.4, 0, 0, W * 0.4, 0, H * 0.8);
  rayGrad.addColorStop(0, 'rgba(180,210,160,0.04)');
  rayGrad.addColorStop(1, 'rgba(180,210,160,0)');
  ctx.fillStyle = rayGrad;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function drawHangingBed(viewport) {
  const bedWidthCm = 40;
  const bedHeightCm = 8;
  const [lx, ly] = plantToScreen(-bedWidthCm / 2, 0, viewport);
  const [rx, ry] = plantToScreen(bedWidthCm / 2, bedHeightCm, viewport);
  const bw = rx - lx;
  const bh = ly - ry;

  // Bed container
  ctx.fillStyle = '#4a3728';
  ctx.strokeStyle = '#5c4a3a';
  ctx.lineWidth = 2;
  const bedY = ly - bh;
  ctx.beginPath();
  ctx.roundRect(lx, bedY, bw, bh, 3);
  ctx.fill();
  ctx.stroke();

  // Coco coir texture
  ctx.fillStyle = '#6b5240';
  const rng = seededRandom(99);
  for (let i = 0; i < 20; i++) {
    const fx = lx + 4 + rng() * (bw - 8);
    const fy = bedY + 3 + rng() * (bh - 6);
    const fw = 3 + rng() * 8;
    ctx.fillRect(fx, fy, fw, 1.5);
  }

  // Label
  ctx.fillStyle = 'rgba(200,190,170,0.5)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('코코배지', (lx + rx) / 2, ly + 12);

  // Support brackets
  ctx.strokeStyle = '#5c5c5c';
  ctx.lineWidth = 2;
  const bracketW = 6;
  ctx.beginPath();
  ctx.moveTo(lx - bracketW, bedY - 10);
  ctx.lineTo(lx - bracketW, bedY + bh);
  ctx.lineTo(lx + 5, bedY + bh);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(rx + bracketW, bedY - 10);
  ctx.lineTo(rx + bracketW, bedY + bh);
  ctx.lineTo(rx - 5, bedY + bh);
  ctx.stroke();
}

function drawTrainingWire(viewport, heightCm) {
  const wireTopCm = Math.max(heightCm + 30, 80);
  const [bx, by] = plantToScreen(2, 0, viewport);
  const [tx, ty] = plantToScreen(2, wireTopCm, viewport);

  ctx.strokeStyle = 'rgba(160,160,160,0.3)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([8, 4]);
  ctx.beginPath();
  ctx.moveTo(bx, by);
  ctx.lineTo(tx, ty);
  ctx.stroke();
  ctx.setLineDash([]);

  // Clips every 20cm
  const clipInterval = 20;
  for (let cm = 10; cm < wireTopCm; cm += clipInterval) {
    const [cx, cy] = plantToScreen(2, cm, viewport);
    ctx.strokeStyle = 'rgba(160,160,160,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 3, cy);
    ctx.lineTo(cx + 3, cy);
    ctx.stroke();
  }
}

function drawStem(nodes, viewport, time) {
  // Draw a single stem line from base to first node if only 1 node
  if (nodes.length === 1) {
    const [bx, by] = plantToScreen(0, 0, viewport);
    const [tx, ty] = plantToScreen(0, nodes[0].heightCm, viewport);
    ctx.strokeStyle = 'rgb(60,120,40)';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(tx, ty);
    ctx.stroke();
    // Growing tip
    ctx.fillStyle = '#5aad40';
    ctx.beginPath();
    ctx.arc(tx, ty, 3, 0, Math.PI * 2);
    ctx.fill();
    return;
  }
  if (nodes.length < 2) return;

  // Draw base segment from soil to first node
  const [baseX, baseY] = plantToScreen(0, 0, viewport);
  const [firstX, firstY] = plantToScreen(0, nodes[0].heightCm, viewport);
  ctx.strokeStyle = 'rgb(50,80,40)';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(baseX, baseY);
  ctx.lineTo(firstX, firstY);
  ctx.stroke();

  // Draw stem segments with natural waviness

  for (let i = 0; i < nodes.length - 1; i++) {
    const n1 = nodes[i];
    const n2 = nodes[i + 1];
    const [x1, y1] = plantToScreen(0, n1.heightCm, viewport);
    const [x2, y2] = plantToScreen(0, n2.heightCm, viewport);

    // Natural waviness
    const wave = Math.sin(i * 0.7 + n1.rng * 3) * 2.5;
    const cpx = (x1 + x2) / 2 + wave;
    const cpy = (y1 + y2) / 2;

    // Stem width tapers
    const widthBase = 5;
    const widthTip = 2;
    const frac = i / nodes.length;
    const sw = lerp(widthBase, widthTip, frac);

    // Stem color - darker at base, greener at top
    const green = Math.round(lerp(80, 140, frac));
    const red = Math.round(lerp(50, 70, frac));
    ctx.strokeStyle = `rgb(${red},${green},40)`;
    ctx.lineWidth = sw;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(cpx, cpy, x2, y2);
    ctx.stroke();

    // Node bump
    ctx.fillStyle = `rgb(${red - 10},${green - 10},35)`;
    ctx.beginPath();
    ctx.arc(x1, y1, sw * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Growing tip
  if (nodes.length > 0) {
    const tip = nodes[nodes.length - 1];
    const [tx, ty] = plantToScreen(0, tip.heightCm, viewport);
    ctx.fillStyle = '#5aad40';
    ctx.beginPath();
    ctx.arc(tx, ty, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawCotyledons(state, viewport) {
  if (!state.hasCotyledons || state.cotyledonSize <= 0) return;

  const baseH = state.nodes.length > 0 ? state.nodes[0].heightCm * 0.5 : 3;
  const [cx, cy] = plantToScreen(0, baseH, viewport);
  const size = 12 * state.cotyledonSize;

  // Two oval cotyledons
  for (const side of [-1, 1]) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(side * 0.5);
    ctx.fillStyle = '#5aad40';
    ctx.beginPath();
    ctx.ellipse(side * size, 0, size, size * 0.4, side * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#4a9030';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  }
}

function drawLeaf(x, y, angle, maturity, sizeFactor, leafletCount, yellowing, droopExtra, side, viewport, time) {
  if (maturity < 0.05) return;

  const scale = viewport.scale / PIXELS_PER_CM;
  const baseLen = 45 * maturity * sizeFactor * Math.max(0.5, scale);
  const droop = 15 + droopExtra;
  const finalAngle = (angle - droop * (side > 0 ? 1 : -1)) * Math.PI / 180;

  // Subtle sway
  const sway = Math.sin(time * 0.8 + x * 0.01 + y * 0.005) * 2 * Math.PI / 180;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(finalAngle + sway);

  // Rachis (central vein)
  const greenBase = yellowing > 0 ? lerp(120, 170, yellowing) : 120;
  const greenR = yellowing > 0 ? lerp(50, 160, yellowing) : 50;
  ctx.strokeStyle = `rgb(${greenR},${Math.round(greenBase)},40)`;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(baseLen, -baseLen * 0.15);
  ctx.stroke();

  // Leaflets
  const leafletPairs = Math.floor(leafletCount / 2);
  for (let i = 0; i <= leafletPairs; i++) {
    const t = leafletCount <= 1 ? 0.7 : (0.2 + 0.7 * (i / leafletPairs));
    const px = baseLen * t;
    const py = -baseLen * 0.15 * t;

    // Size: largest in middle
    const sizeMod = i === leafletPairs ? 1.1 : (0.6 + 0.4 * Math.sin(t * Math.PI));
    const lw = 8 * maturity * sizeFactor * sizeMod * Math.max(0.4, scale);
    const lh = 4 * maturity * sizeFactor * sizeMod * Math.max(0.4, scale);

    const leafGreen = yellowing > 0 ? Math.round(lerp(130, 180, yellowing)) : Math.round(100 + 40 * maturity);
    const leafRed = yellowing > 0 ? Math.round(lerp(40, 160, yellowing)) : 40;
    const fillColor = `rgb(${leafRed},${leafGreen},${yellowing > 0 ? 50 : 30})`;

    if (i < leafletPairs) {
      // Paired leaflets
      for (const ls of [-1, 1]) {
        ctx.fillStyle = fillColor;
        ctx.beginPath();
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(ls * 0.4);
        // Leaflet shape: pointed ellipse
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(lw * 0.3, -lh * ls, lw * 0.7, -lh * ls * 0.8, lw, 0);
        ctx.bezierCurveTo(lw * 0.7, lh * ls * 0.3, lw * 0.3, lh * ls * 0.2, 0, 0);
        ctx.fill();
        // Serrated edge hint
        ctx.strokeStyle = `rgba(${leafRed + 10},${leafGreen + 10},35,0.3)`;
        ctx.lineWidth = 0.3;
        ctx.stroke();
        ctx.restore();
      }
    } else {
      // Terminal leaflet
      ctx.fillStyle = fillColor;
      ctx.beginPath();
      ctx.save();
      ctx.translate(px, py);
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(lw * 0.4, -lh * 1.2, lw * 0.8, -lh, lw * 1.1, 0);
      ctx.bezierCurveTo(lw * 0.8, lh, lw * 0.4, lh * 1.2, 0, 0);
      ctx.fill();
      ctx.restore();
    }
  }

  ctx.restore();
}

function drawFlower(cx, cy, bloomProgress, scale) {
  if (bloomProgress <= 0) return;

  const petalCount = 5;
  const petalLen = 5 * bloomProgress * Math.max(0.5, scale);
  const petalWidth = 2.5 * bloomProgress * Math.max(0.5, scale);

  ctx.save();
  ctx.translate(cx, cy);

  // Petals
  for (let i = 0; i < petalCount; i++) {
    const angle = (i / petalCount) * Math.PI * 2 - Math.PI / 2;
    ctx.save();
    ctx.rotate(angle);
    ctx.fillStyle = '#f0d040';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(petalWidth, -petalLen * 0.3, petalWidth, -petalLen * 0.7, 0, -petalLen);
    ctx.bezierCurveTo(-petalWidth, -petalLen * 0.7, -petalWidth, -petalLen * 0.3, 0, 0);
    ctx.fill();
    ctx.restore();
  }

  // Center
  ctx.fillStyle = '#a08820';
  ctx.beginPath();
  ctx.arc(0, 0, 1.5 * bloomProgress * Math.max(0.4, scale), 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawFruit(cx, cy, diameterMm, color, scale) {
  const radius = (diameterMm / 2) * 0.32 * Math.max(0.4, scale); // scale mm to pixels
  if (radius < 1) return;

  // Fruit body with gradient for 3D look
  const grad = ctx.createRadialGradient(cx - radius * 0.3, cy - radius * 0.3, 0, cx, cy, radius);
  grad.addColorStop(0, `rgba(${Math.min(255, color[0] + 50)},${Math.min(255, color[1] + 40)},${Math.min(255, color[2] + 30)},1)`);
  grad.addColorStop(0.7, `rgb(${color[0]},${color[1]},${color[2]})`);
  grad.addColorStop(1, `rgb(${Math.max(0, color[0] - 30)},${Math.max(0, color[1] - 20)},${Math.max(0, color[2] - 15)})`);

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();

  // Calyx (green star at top)
  if (radius > 3) {
    const calyxSize = radius * 0.4;
    ctx.fillStyle = '#3a7a30';
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy - radius);
      ctx.lineTo(cx + Math.cos(a) * calyxSize, cy - radius + Math.sin(a) * calyxSize * 0.5 - calyxSize * 0.3);
      ctx.lineTo(cx + Math.cos(a + 0.3) * calyxSize * 0.3, cy - radius - calyxSize * 0.1);
      ctx.fill();
    }
  }

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.arc(cx - radius * 0.25, cy - radius * 0.25, radius * 0.3, 0, Math.PI * 2);
  ctx.fill();
}

function drawTruss(node, viewport, time) {
  if (!node.truss) return;

  const truss = node.truss;
  const trussOffsetCm = node.side * 1.5;
  const [stemX, stemY] = plantToScreen(trussOffsetCm, node.heightCm, viewport);
  const scale = viewport.scale / PIXELS_PER_CM;

  // Peduncle direction (opposite side from leaf for visual clarity)
  const pedAngle = -node.side * 50 * Math.PI / 180;
  const pedLen = 30 * Math.max(0.5, scale);

  // Draw peduncle
  const pedEndX = stemX + Math.cos(pedAngle) * pedLen;
  const pedEndY = stemY - Math.sin(pedAngle) * pedLen * 0.3;

  ctx.strokeStyle = '#4a8a30';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(stemX, stemY);
  ctx.quadraticCurveTo(
    (stemX + pedEndX) / 2,
    (stemY + pedEndY) / 2 - 5,
    pedEndX,
    pedEndY
  );
  ctx.stroke();

  // Draw flowers
  truss.flowers.forEach((flower, fi) => {
    const spread = (fi - (truss.flowers.length + truss.fruits.length) / 2) * 10 * Math.max(0.4, scale);
    const fx = pedEndX + spread * node.side;
    const fy = pedEndY + fi * 5 * Math.max(0.4, scale);

    // Small branch to flower
    ctx.strokeStyle = '#4a8a30';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(pedEndX, pedEndY);
    ctx.lineTo(fx, fy);
    ctx.stroke();

    drawFlower(fx, fy, flower.bloomProgress, scale);
  });

  // Draw fruits
  truss.fruits.forEach((fruit, fi) => {
    const spread = (fi - truss.fruits.length / 2) * 12 * Math.max(0.4, scale);
    const fx = pedEndX + spread * node.side;
    // Gravity: heavier fruits hang lower
    const gravity = fruit.diameterMm * 0.08 * Math.max(0.4, scale);
    const fy = pedEndY + gravity + fi * 3;

    // Branch to fruit
    ctx.strokeStyle = '#4a8a30';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pedEndX, pedEndY);
    ctx.lineTo(fx, fy);
    ctx.stroke();

    drawFruit(fx, fy, fruit.diameterMm, fruit.color, scale);
  });
}

function render(state, time) {
  ctx.clearRect(0, 0, W, H);

  const viewport = computeViewport(state.heightCm);

  drawBackground(state);
  drawHangingBed(viewport);
  drawTrainingWire(viewport, state.heightCm);

  // Draw stem
  drawStem(state.nodes, viewport, time);

  // Draw cotyledons
  drawCotyledons(state, viewport);

  // Draw leaves and trusses (bottom to top)
  state.nodes.forEach((node, i) => {
    // Offset leaf origin to the side of the stem
    const stemOffsetCm = node.side * 1.5;
    const [nx, ny] = plantToScreen(stemOffsetCm, node.heightCm, viewport);

    // Draw leaf
    drawLeaf(
      nx, ny,
      node.baseAngle,
      node.leafMaturity,
      node.leafSizeFactor,
      node.leafletCount,
      node.yellowing,
      node.droopExtra,
      node.side,
      viewport,
      time
    );

    // Draw truss
    if (node.truss) {
      drawTruss(node, viewport, time);
    }
  });

  // Day label on canvas
  ctx.fillStyle = 'rgba(200,210,200,0.4)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`Day ${Math.floor(state.day)}`, 12, H - 12);
}

// ============================================================
// ANIMATION CONTROLLER
// ============================================================
let currentDay = 0;
let isPlaying = true;
let playbackSpeed = 1;
let lastFrameTime = null;
let lastStageName = '';

const stageOverlay = document.getElementById('stage-overlay');
let stageOverlayTimeout = null;

function showStageOverlay(text) {
  stageOverlay.textContent = text;
  stageOverlay.style.opacity = '1';
  if (stageOverlayTimeout) clearTimeout(stageOverlayTimeout);
  stageOverlayTimeout = setTimeout(() => {
    stageOverlay.style.opacity = '0';
  }, 2000);
}

function updateUI(state) {
  document.getElementById('v-stage').textContent = state.currentStage.name;
  document.getElementById('v-day').textContent = `${Math.floor(state.day)} / ${TOTAL_DAYS}`;
  document.getElementById('v-height').textContent = `${state.heightCm.toFixed(1)} cm`;
  document.getElementById('v-leaves').textContent = state.leafCount;
  document.getElementById('v-trusses').textContent = state.trussCount;
  document.getElementById('v-fruits').textContent = state.totalFruits;

  if (state.maxRipenStage >= 0) {
    document.getElementById('v-ripen').textContent = RIPEN_NAMES[state.maxRipenStage];
  } else {
    document.getElementById('v-ripen').textContent = '-';
  }

  // Stage transition overlay
  if (state.currentStage.name !== lastStageName) {
    lastStageName = state.currentStage.name;
    if (state.day > 1) {
      showStageOverlay(state.currentStage.name);
    }
  }

  // Update scrubber
  document.getElementById('scrubber').value = state.day;
}

function tick(timestamp) {
  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = (timestamp - lastFrameTime) / 1000; // seconds
  lastFrameTime = timestamp;

  if (isPlaying) {
    currentDay += (dt / TOTAL_DURATION) * TOTAL_DAYS * playbackSpeed;
    if (currentDay >= TOTAL_DAYS) {
      currentDay = TOTAL_DAYS;
      isPlaying = false;
      document.getElementById('play-btn').innerHTML = '&#9654;';
    }
  }

  const state = computePlantState(currentDay);
  render(state, timestamp / 1000);
  updateUI(state);

  requestAnimationFrame(tick);
}

// ============================================================
// CONTROLS
// ============================================================
const playBtn = document.getElementById('play-btn');
const resetBtn = document.getElementById('reset-btn');
const scrubber = document.getElementById('scrubber');
const speedBtn = document.getElementById('speed-btn');

playBtn.addEventListener('click', () => {
  if (currentDay >= TOTAL_DAYS) {
    currentDay = 0;
  }
  isPlaying = !isPlaying;
  playBtn.innerHTML = isPlaying ? '&#10074;&#10074;' : '&#9654;';
  lastFrameTime = null;
});

resetBtn.addEventListener('click', () => {
  currentDay = 0;
  isPlaying = false;
  playBtn.innerHTML = '&#9654;';
  lastFrameTime = null;
  lastStageName = '';
});

scrubber.addEventListener('input', (e) => {
  currentDay = parseFloat(e.target.value);
  isPlaying = false;
  playBtn.innerHTML = '&#9654;';
  lastFrameTime = null;
});

const speeds = [0.5, 1, 2, 4];
let speedIndex = 1;
speedBtn.addEventListener('click', () => {
  speedIndex = (speedIndex + 1) % speeds.length;
  playbackSpeed = speeds[speedIndex];
  speedBtn.textContent = `${playbackSpeed}x`;
});

// Start
requestAnimationFrame(tick);
</script>
